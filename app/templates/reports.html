{% extends "admin_base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename ='css/date-range-picker.css') }}">
<div class="space-y-6 sm:space-y-8">

    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-gray-900">Generate Reports</h1>
            <p class="text-sm sm:text-base text-gray-600 mt-1">
                Create custom analytics reports for encounters and services
            </p>
        </div>
    </div>

    <!-- Report Configuration Form -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 ">
        <div class="bg-gradient-to-r from-gray-50 to-white px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-bold text-gray-900">Report Configuration</h2>
            <p class="text-sm text-gray-600 mt-1">Select report type and time period</p>
        </div>

        <form action="{{ url_for('view_report') }}" method="GET" class="p-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

                <!-- Report Type -->
                <div>
                    <label for="report_type" class="block text-base font-semibold text-gray-900 mb-2">
                        Report Type
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <select id="report_type" name="report_type" required class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg shadow-sm text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all appearance-none">
                            <option value="" disabled selected>Select a report...</option>
                            <option value="utilization">Service Utilization (by Facility)</option>
                            <option value="encounter">Encounter Summary (All Facilities)</option>
                            <option value="categorization">Disease Categorization (All Facilities)</option>
                            <option value="nhia_encounter"> NHIA Encounter Report Format</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Facility -->
                <div id="facility-selector-div" style="display: none;">
                    <label for="facility_id" class="block text-base font-semibold text-gray-900 mb-2">
                        Facility
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                        </div>
                        <select id="facility_id" name="facility_id" class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg shadow-sm text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all appearance-none">
                            <option value="">Select a facility...</option>
                            {% for facility in facilities %}
                            <option value="{{ facility.id }}">{{ facility.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                    </div>
                </div>
            <!-- Date Range -->
            <div class="sm:col-span-2">
                <label class="block text-xs font-bold text-gray-700 mb-1 uppercase tracking-wide">Date Range</label>
                <button type="button" id="date-range-btn" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 hover:bg-gray-100 text-left flex items-center justify-between transition-colors">
                    <span id="date-range-display">{{ start_date.strftime('%b %d, %Y') }} - {{ end_date.strftime('%b %d, %Y') }}</span>
                    <svg class="h-4 w-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </button>
                <!-- Hidden fields for date range -->
                <input type="hidden" id="start_date" name="start_date" value="{{ start_date.strftime('%Y-%m-%d') }}">
                <input type="hidden" id="end_date" name="end_date" value="{{ end_date.strftime('%Y-%m-%d') }}">
            </div>

            <!-- Submit Button -->
            <div class="mt-8">
                <button type="submit" class="inline-flex items-center justify-center px-6 py-3 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white rounded-lg text-base font-semibold hover:from-indigo-700 hover:to-indigo-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Generate Report
                </button>
            </div>
        </form>
    </div>
</div>

    <!-- Date Range Picker Script -->
    <script src="{{ url_for('static', filename='js/date-range-picker.js') }}"></script>


<script>

        const dateRangeBtn = document.getElementById('date-range-btn');
        const dateRangeDisplay = document.getElementById('date-range-display');
        const startDateInput = document.getElementById('start_date');
        const endDateInput = document.getElementById('end_date');

        // Initialize Date Range Picker
        const dateRangePicker = new DateRangePicker({
            initialStartDate: startDateInput.value,
            initialEndDate: endDateInput.value,
            onApply: function(result) {
                // Format dates for display
                dateRangeDisplay.textContent = result.fromDateString + ' - ' + result.toDateString;

                // Update hidden fields (YYYY-MM-DD format)
                startDateInput.value = result.fromDate.toISOString().split('T')[0];
                endDateInput.value = result.toDate.toISOString().split('T')[0];
            }
        });

        // Open date range picker when button is clicked
        if (dateRangeBtn) {
            dateRangeBtn.addEventListener('click', function() {
                dateRangePicker.open();
            });
        }

    document.addEventListener('DOMContentLoaded', function() {
        const reportTypeSelect = document.getElementById('report_type');
        const facilitySelectorDiv = document.getElementById('facility-selector-div');
        const facilitySelect = document.getElementById('facility_id');

        function toggleFacilitySelector() {
            // Check if the selected value is 'utilization'
            if (reportTypeSelect.value === 'utilization') {
                facilitySelectorDiv.style.display = 'block';
                // Make the facility dropdown required
                facilitySelect.setAttribute('required', 'required');
            } else {
                facilitySelectorDiv.style.display = 'none';
                // Make the facility dropdown not required
                facilitySelect.removeAttribute('required');
            }
        }

        // Add an event listener to run the function whenever the selection changes
        reportTypeSelect.addEventListener('change', toggleFacilitySelector);

        // Run the function once on page load to set the initial state
        toggleFacilitySelector();
    });
</script>

{% endblock %}
